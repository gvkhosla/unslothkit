name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -v
      - name: Smoke test CLI
        run: |
          python -m finetunekit doctor
          python -m finetunekit recommend --task support-bot --vram-gb 8 --no-detect
          python -m finetunekit demo /tmp/finetunekit-demo
          python -m finetunekit data check /tmp/finetunekit-demo/data/train.jsonl
